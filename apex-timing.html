<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⏰ Apex Timing Analysis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ccc;font-family:monospace;font-size:13px;padding:12px;max-width:520px;margin:0 auto}
h1{color:#00ff41;font-size:16px;margin-bottom:4px}
.sub{color:#555;font-size:11px;margin-bottom:14px}
button{background:#111;border:1px solid #00ff41;color:#00ff41;padding:5px 12px;border-radius:4px;font-family:monospace;font-size:11px;cursor:pointer}
.box{background:#111;border:1px solid #222;border-radius:6px;margin-bottom:14px;overflow:hidden}
.box-hd{padding:9px 12px;border-bottom:1px solid #222;color:#fff;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.box-hd span{color:#555;font-size:10px}
.empty{text-align:center;padding:22px;color:#444;font-size:11px}
.row{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #141414;gap:8px}
.row:last-child{border-bottom:none}
.lbl{width:70px;color:#aaa;font-size:11px;flex-shrink:0}
.bar-wrap{flex:1;background:#1a1a1a;border-radius:3px;height:18px;position:relative;overflow:hidden}
.bar{height:100%;border-radius:3px;transition:width .3s}
.bar-txt{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:#fff;white-space:nowrap}
.cnt{width:54px;text-align:right;color:#555;font-size:10px;flex-shrink:0}
.note{color:#555;font-size:10px;padding:8px 12px;line-height:1.5}
.best{color:#00ff41;font-weight:bold}
.legend{display:flex;gap:12px;padding:8px 12px;font-size:10px;color:#666;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.last{text-align:center;color:#333;font-size:10px;margin-top:8px}
.warn{background:rgba(255,193,7,.08);border:1px solid rgba(255,193,7,.2);color:#ffc107;padding:8px 12px;border-radius:5px;font-size:10px;margin-bottom:14px;line-height:1.5}
</style>
</head>
<body>

<h1>⏰ Apex Timing Analysis <button onclick="load()" style="float:right">↻</button></h1>
<div class="sub">When do winning signals happen? (2x+ = win)</div>

<div class="warn" id="data-warn" style="display:none"></div>

<div class="box">
  <div class="box-hd">Win Rate by Day of Week <span id="dow-tz"></span></div>
  <div id="dow"><div class="empty">Loading...</div></div>
</div>

<div class="box">
  <div class="box-hd">Win Rate by Hour <span id="hr-tz"></span></div>
  <div id="hours"><div class="empty">Loading...</div></div>
  <div class="legend">
    <span><span class="dot" style="background:#00ff41"></span>≥50% win</span>
    <span><span class="dot" style="background:#ffc107"></span>30-49%</span>
    <span><span class="dot" style="background:#ff4141"></span>&lt;30%</span>
  </div>
</div>

<div class="box">
  <div class="box-hd">Best Windows</div>
  <div id="best"><div class="empty">Loading...</div></div>
</div>

<div class="last" id="updated">—</div>

<script>
const URL="https://ksulmvlrmwpalgqzlxjt.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdWxtdmxybXdwYWxncXpseGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzQ0NzAsImV4cCI6MjA5NTMxMDQ3MH0.lbVBCzcYrpbGp5J-m1Xz33sTf7k799A8md0pWIJfXYw";

const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

async function db(t,q=""){
  const r=await fetch(`${URL}/rest/v1/${t}?${q}`,{headers:{"apikey":KEY,"Authorization":`Bearer ${KEY}`}});
  return r.json();
}

function barColor(wr){ return wr>=50?"#00ff41":wr>=30?"#ffc107":"#ff4141"; }

async function load(){
  try{
    // Pull outcomes (these have the win/loss result) — match to signals for timing
    const [outs, sigs] = await Promise.all([
      db("outcomes","order=created_at.desc&limit=1000"),
      db("signals","select=mint,created_at&order=created_at.desc&limit=2000")
    ]);

    if(!Array.isArray(outs) || outs.length===0){
      document.getElementById("dow").innerHTML='<div class="empty">No outcomes yet — need 24h+ of data</div>';
      document.getElementById("hours").innerHTML='<div class="empty">No outcomes yet</div>';
      document.getElementById("best").innerHTML='<div class="empty">No outcomes yet</div>';
      return;
    }

    // Map signal mint -> original signal time (when the launch was alerted)
    const sigTime={};
    if(Array.isArray(sigs)) for(const s of sigs){ if(!sigTime[s.mint]) sigTime[s.mint]=s.created_at; }

    // Use the SIGNAL time (alert time) for timing, not outcome save time.
    // Outcome saves 24h later, so signal time is the real "launch caught" moment.
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "local";
    document.getElementById("dow-tz").textContent = tz;
    document.getElementById("hr-tz").textContent = tz;

    // Buckets
    const dow = Array.from({length:7},()=>({win:0,total:0}));
    const hr  = Array.from({length:24},()=>({win:0,total:0}));

    let analyzed=0;
    for(const o of outs){
      const t = sigTime[o.mint] || o.created_at; // fallback to outcome time
      if(!t) continue;
      const d = new Date(t);
      const isWin = (o.peak_x||0) >= 2;
      dow[d.getDay()].total++; if(isWin) dow[d.getDay()].win++;
      hr[d.getHours()].total++; if(isWin) hr[d.getHours()].win++;
      analyzed++;
    }

    // Data sufficiency warning
    const warn=document.getElementById("data-warn");
    if(analyzed < 100){
      warn.style.display="block";
      warn.textContent=`⚠️ Only ${analyzed} outcomes analyzed. Patterns are noisy below ~100-200. Treat as early hints, not firm conclusions. Day-of-week is more reliable than hour at this sample size.`;
    } else { warn.style.display="none"; }

    // Render day of week
    const maxDowTotal = Math.max(...dow.map(d=>d.total),1);
    document.getElementById("dow").innerHTML = dow.map((d,i)=>{
      const wr = d.total>0 ? Math.round((d.win/d.total)*100) : 0;
      const widthPct = d.total>0 ? wr : 0;
      return `<div class="row">
        <div class="lbl">${DAYS[i]}</div>
        <div class="bar-wrap"><div class="bar" style="width:${widthPct}%;background:${barColor(wr)}"></div>
          <div class="bar-txt">${d.total>0?wr+"%":"—"}</div></div>
        <div class="cnt">${d.win}/${d.total}</div>
      </div>`;
    }).join("");

    // Render hours (only show hours that have data to reduce clutter)
    const hoursWithData = hr.map((h,i)=>({...h,hour:i})).filter(h=>h.total>0);
    if(hoursWithData.length===0){
      document.getElementById("hours").innerHTML='<div class="empty">No hourly data yet</div>';
    } else {
      document.getElementById("hours").innerHTML = hoursWithData.map(h=>{
        const wr = Math.round((h.win/h.total)*100);
        const label = `${String(h.hour).padStart(2,"0")}:00`;
        return `<div class="row">
          <div class="lbl">${label}</div>
          <div class="bar-wrap"><div class="bar" style="width:${wr}%;background:${barColor(wr)}"></div>
            <div class="bar-txt">${wr}%</div></div>
          <div class="cnt">${h.win}/${h.total}</div>
        </div>`;
      }).join("");
    }

    // Best windows — top day + top hours (require min sample)
    const bestDays = dow.map((d,i)=>({day:DAYS[i],wr:d.total>0?d.win/d.total:0,total:d.total}))
      .filter(d=>d.total>=3).sort((a,b)=>b.wr-a.wr);
    const bestHours = hr.map((h,i)=>({hour:i,wr:h.total>0?h.win/h.total:0,total:h.total}))
      .filter(h=>h.total>=3).sort((a,b)=>b.wr-a.wr);

    let bestHtml="";
    if(bestDays.length>0){
      bestHtml += `<div class="note">📅 Best day: <span class="best">${bestDays[0].day}</span> — ${Math.round(bestDays[0].wr*100)}% win (${bestDays[0].total} signals)</div>`;
    }
    if(bestHours.length>0){
      const top3 = bestHours.slice(0,3).map(h=>`${String(h.hour).padStart(2,"0")}:00 (${Math.round(h.wr*100)}%)`).join(", ");
      bestHtml += `<div class="note">🕐 Best hours: <span class="best">${top3}</span></div>`;
    }
    if(!bestHtml) bestHtml='<div class="empty">Need ≥3 signals per bucket to rank</div>';
    document.getElementById("best").innerHTML = bestHtml;

    document.getElementById("updated").textContent = `Analyzed ${analyzed} outcomes • Updated ${new Date().toLocaleTimeString()}`;

  }catch(e){
    document.getElementById("dow").innerHTML=`<div class="empty">Error: ${e.message}</div>`;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
