<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Apex Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ccc;font-family:monospace;font-size:13px;padding:12px;max-width:480px;margin:0 auto}
h1{color:#00ff41;font-size:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
button{background:#111;border:1px solid #00ff41;color:#00ff41;padding:5px 12px;border-radius:4px;font-family:monospace;font-size:11px;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.card{background:#111;border:1px solid #222;border-radius:6px;padding:12px}
.card .lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px}
.card .val{font-size:22px;color:#fff;margin-top:2px}
.card .val.g{color:#00ff41}.card .val.r{color:#ff4141}.card .val.y{color:#ffc107}.card .val.p{color:#bb86fc}
.box{background:#111;border:1px solid #222;border-radius:6px;margin-bottom:12px;overflow:hidden}
.box-hd{padding:8px 12px;border-bottom:1px solid #222;color:#fff;font-size:12px}
.empty{text-align:center;padding:24px;color:#444}
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;text-align:left;font-size:9px;color:#555;text-transform:uppercase;border-bottom:1px solid #1a1a1a}
td{padding:6px 8px;font-size:11px;border-bottom:1px solid #141414}
.t{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold}
.tk{background:rgba(0,255,65,.15);color:#00ff41}
.tu{background:rgba(255,193,7,.15);color:#ffc107}
.tp{background:rgba(79,195,247,.15);color:#4fc3f7}
.tw{background:rgba(0,255,65,.15);color:#00ff41}
.tr{background:rgba(255,65,65,.15);color:#ff4141}
.tm{background:rgba(187,134,252,.15);color:#bb86fc}
.ts{background:rgba(187,134,252,.15);color:#bb86fc}
.last-update{text-align:center;color:#333;font-size:10px;margin-top:8px}
</style>
</head>
<body>
<h1>⚡ Apex <button onclick="load()">↻</button></h1>

<div class="grid">
  <div class="card"><div class="lbl">Signals</div><div class="val g" id="s-total">--</div></div>
  <div class="card"><div class="lbl">Win Rate 2x+</div><div class="val y" id="s-wr">--</div></div>
  <div class="card"><div class="lbl">KOL</div><div class="val" id="s-kol">--</div></div>
  <div class="card"><div class="lbl">Ultra Early</div><div class="val y" id="s-ultra">--</div></div>
  <div class="card"><div class="lbl">KOL Early 👑</div><div class="val g" id="s-kolearly">--</div></div>
  <div class="card"><div class="lbl">Stable Gem 📊</div><div class="val p" id="s-stable">--</div></div>
  <div class="card"><div class="lbl">Best</div><div class="val p" id="s-best">--</div></div>
  <div class="card"><div class="lbl">Rugs</div><div class="val r" id="s-rugs">--</div></div>
</div>

<div class="box">
  <div class="box-hd">Recent Signals</div>
  <div id="sig"></div>
</div>

<div class="box">
  <div class="box-hd">Outcomes</div>
  <div id="out"></div>
</div>

<div class="last-update" id="updated">Auto-refresh every 30s</div>

<script>
const URL="https://ksulmvlrmwpalgqzlxjt.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdWxtdmxybXdwYWxncXpseGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzQ0NzAsImV4cCI6MjA5NTMxMDQ3MH0.lbVBCzcYrpbGp5J-m1Xz33sTf7k799A8md0pWIJfXYw";

async function db(t,q=""){
  const r=await fetch(`${URL}/rest/v1/${t}?${q}`,{headers:{"apikey":KEY,"Authorization":`Bearer ${KEY}`}});
  return r.json();
}

function ago(ts){
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60)return s+"s";if(s<3600)return Math.floor(s/60)+"m";
  if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d";
}

function tc(t){if(!t)return"tk";if(t.includes("STABLE"))return"ts";if(t.includes("KOL"))return"tk";if(t.includes("ULTRA"))return"tu";if(t.includes("PUMP"))return"tp";return"tk";}
function rc(r){if(!r)return"";if(r.includes("MOON"))return"tm";if(r.includes("WIN")||r.includes("BANGER"))return"tw";if(r.includes("RUG"))return"tr";return"";}

async function load(){
  try{
    const[sigs,outs]=await Promise.all([
      db("signals","order=created_at.desc&limit=500"),
      db("outcomes","order=created_at.desc&limit=500")
    ]);

    document.getElementById("s-total").textContent=Array.isArray(sigs)?sigs.length:0;
    document.getElementById("s-kol").textContent=Array.isArray(sigs)?sigs.filter(s=>s.signal_type==="KOL").length:0;
    document.getElementById("s-ultra").textContent=Array.isArray(sigs)?sigs.filter(s=>s.signal_type==="ULTRA").length:0;
    document.getElementById("s-kolearly").textContent=Array.isArray(sigs)?sigs.filter(s=>s.signal_type==="KOL_EARLY").length:0;
    document.getElementById("s-stable").textContent=Array.isArray(sigs)?sigs.filter(s=>s.signal_type==="STABLE_GEM").length:0;

    if(Array.isArray(outs)&&outs.length>0){
      const wins=outs.filter(o=>o.peak_x>=2).length;
      document.getElementById("s-wr").textContent=((wins/outs.length)*100).toFixed(0)+"%";
      const rugs=outs.filter(o=>o.result&&o.result.includes("RUG")).length;
      document.getElementById("s-rugs").textContent=rugs;
      const best=outs.reduce((a,b)=>(a.peak_x||0)>(b.peak_x||0)?a:b);
      document.getElementById("s-best").textContent=(best.peak_x||0).toFixed(1)+"x $"+(best.symbol||"?");
    }else{
      document.getElementById("s-wr").textContent="0%";
      document.getElementById("s-rugs").textContent="0";
      document.getElementById("s-best").textContent="--";
    }

    // Signals table
    document.getElementById("sig").innerHTML=!Array.isArray(sigs)||sigs.length===0
      ?'<div class="empty">No signals yet</div>'
      :`<table><thead><tr><th>Symbol</th><th>Type</th><th>MC</th><th>Smart</th><th>AI%</th><th>Age</th></tr></thead><tbody>
        ${sigs.map(s=>`<tr>
          <td style="color:#fff">$${s.symbol||"?"}</td>
          <td><span class="t ${tc(s.signal_type)}">${s.signal_type||"?"}</span></td>
          <td>${s.alert_mc?(s.alert_mc/1000).toFixed(1)+"K":"N/A"}</td>
          <td>${s.smart_degen_count||0}</td>
          <td style="color:${(s.ai_confidence||0)>=80?"#00ff41":(s.ai_confidence||0)>=60?"#ffc107":"#ff4141"}">${s.ai_confidence||0}%</td>
          <td style="color:#555">${ago(s.created_at)}</td>
        </tr>`).join("")}
      </tbody></table>`;

    // Outcomes table
    document.getElementById("out").innerHTML=!Array.isArray(outs)||outs.length===0
      ?'<div class="empty">No outcomes yet</div>'
      :`<table><thead><tr><th>Symbol</th><th>Type</th><th>Peak</th><th>Result</th><th>Age</th></tr></thead><tbody>
        ${outs.map(o=>`<tr>
          <td style="color:#fff">$${o.symbol||"?"}</td>
          <td><span class="t ${tc(o.signal_type)}">${o.signal_type||"?"}</span></td>
          <td style="color:${(o.peak_x||0)>=5?"#bb86fc":(o.peak_x||0)>=2?"#00ff41":"#ff4141"}">${(o.peak_x||0).toFixed(2)}x</td>
          <td><span class="t ${rc(o.result)}">${o.result||"?"}</span></td>
          <td style="color:#555">${ago(o.created_at)}</td>
        </tr>`).join("")}
      </tbody></table>`;

    document.getElementById("updated").textContent="Updated "+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById("sig").innerHTML=`<div class="empty">Error: ${e.message}</div>`;
  }
}

load();
setInterval(load,30000);
</script>
</body>
</html>
